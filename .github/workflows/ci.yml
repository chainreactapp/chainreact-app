name: CI

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  lint-and-typecheck:
    name: Lint & Type Check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - run: npm ci
      - name: Run ESLint
        run: npx next lint --quiet
      # Type check is skipped for now - next lint covers syntax errors
      # and tsc --noEmit requires all env vars to be set
      # Uncomment when ready: - run: npx tsc --noEmit

  unit-tests:
    name: Unit Tests
    runs-on: ubuntu-latest
    env:
      ENCRYPTION_KEY: ci-test-key-at-least-32-characters-long
      NODE_ENV: test
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - run: npm ci
      - name: Run unit tests
        run: npx jest --config ./jest.config.cjs --ci --coverage --forceExit
      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: coverage-report
          path: coverage/

  build-check:
    name: Build Check
    runs-on: ubuntu-latest
    if: github.event_name == 'pull_request'
    env:
      NODE_OPTIONS: --max-old-space-size=4096
      # Dummy env vars so next build doesn't crash on missing config
      NEXT_PUBLIC_SUPABASE_URL: http://localhost:54321
      SUPABASE_SECRET_KEY: dummy-secret-for-build
      NEXT_PUBLIC_SUPABASE_PUBLISHABLE_KEY: dummy-anon-key-for-build
      OPENAI_API_KEY: dummy-key-for-build
      STRIPE_CLIENT_SECRET: sk_test_dummy_for_build
      ENCRYPTION_KEY: dummy-encryption-key-for-build-32ch
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - run: npm ci
      - run: npm run build

  # PR-E — Infrastructure-bound tests. Brings up Postgres + MailHog +
  # stripe-mock from docker-compose.test.yml and runs the smoke suite.
  # The full suite of infra tests lands in PR-F; today this job verifies
  # only that the harnesses can connect.
  infra-tests:
    name: Infrastructure Smoke Tests
    runs-on: ubuntu-latest
    env:
      NODE_ENV: test
      # PR-F item 9: Google OAuth sandbox round-trip. Secrets are
      # optional — when unset, the google-oauth.infra.test.ts suite
      # logs a skip note and exits 0. Once provisioned per
      # learning/docs/test-infra-credentials.md, these secrets enable
      # the live token-exchange validation.
      TEST_GOOGLE_CLIENT_ID: ${{ secrets.TEST_GOOGLE_CLIENT_ID }}
      TEST_GOOGLE_CLIENT_SECRET: ${{ secrets.TEST_GOOGLE_CLIENT_SECRET }}
      TEST_GOOGLE_REFRESH_TOKEN: ${{ secrets.TEST_GOOGLE_REFRESH_TOKEN }}
      TEST_GOOGLE_USER_EMAIL: ${{ secrets.TEST_GOOGLE_USER_EMAIL }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - run: npm ci
      - name: Bring up test infrastructure
        run: npm run test:infra:up
      - name: Run infra smoke tests
        run: npm run test:infra
      - name: Tear down test infrastructure
        if: always()
        run: npm run test:infra:down
